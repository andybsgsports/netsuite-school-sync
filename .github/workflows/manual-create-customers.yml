name: Manual - Create Missing NS Customers

on:
  workflow_dispatch:
    inputs:
      school:
        description: 'Optional: limit to one school name (exact match).'
        required: false
        default: ''
      live:
        description: 'Actually create NS customers? (unchecked = dry-run)'
        required: true
        default: false
        type: boolean

jobs:
  create:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 gspread google-auth

      - name: Run (${{ inputs.live && 'LIVE' || 'DRY-RUN' }})
        run: |
          ARGS=""
          if [ -n "${{ inputs.school }}" ]; then
            ARGS="--school \"${{ inputs.school }}\""
          fi
          if [ "${{ inputs.live }}" = "true" ]; then
            ARGS="$ARGS --live"
          fi
          eval python create_missing_ns_customers.py $ARGS
        env:
          NS_ACCOUNT:              ${{ secrets.NS_ACCOUNT }}
          NS_CONSUMER_KEY:         ${{ secrets.NS_CONSUMER_KEY }}
          NS_CONSUMER_SEC:         ${{ secrets.NS_CONSUMER_SEC }}
          NS_TOKEN_KEY:            ${{ secrets.NS_TOKEN_KEY }}
          NS_TOKEN_SEC:            ${{ secrets.NS_TOKEN_SEC }}
          GOOGLE_SHEET_ID:         ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
