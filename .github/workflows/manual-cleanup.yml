name: Manual Cleanup - Duplicate Addresses

on:
  workflow_dispatch:
    inputs:
      customer_ids:
        description: 'NS Customer IDs, space-separated. Leave blank to process all schools from the sheet.'
        required: false
        default: ''
        type: string
      live:
        description: 'Actually remove duplicates? (unchecked = dry-run)'
        required: true
        default: false
        type: boolean

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 gspread google-auth

      - name: Run cleanup (${{ inputs.live && 'LIVE' || 'DRY-RUN' }})
        run: |
          ARGS="${{ inputs.customer_ids }}"
          if [ "${{ inputs.live }}" = "true" ]; then
            ARGS="$ARGS --live"
          fi
          python cleanup_duplicate_addresses.py $ARGS
        env:
          NS_ACCOUNT:              ${{ secrets.NS_ACCOUNT }}
          NS_CONSUMER_KEY:         ${{ secrets.NS_CONSUMER_KEY }}
          NS_CONSUMER_SEC:         ${{ secrets.NS_CONSUMER_SEC }}
          NS_TOKEN_KEY:            ${{ secrets.NS_TOKEN_KEY }}
          NS_TOKEN_SEC:            ${{ secrets.NS_TOKEN_SEC }}
          GOOGLE_SHEET_ID:         ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
