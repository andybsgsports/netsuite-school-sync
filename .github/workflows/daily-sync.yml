name: WI Sync to NetSuite (manual)

on:
  # Schedule disabled — daily refresh is now "Daily Scrape (no NetSuite)".
  # Run this workflow when you want to push sheet changes to NS.
  workflow_dispatch:
    inputs:
      sales_rep:
        description: 'Only sync schools for this Sales Rep (blank = all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - 'Andrew Murray'
          - 'Jeff Howard'
          - 'Tyler Fuhrman'
          - 'Kyle Loughrin'
          - 'Paul Speth'
          - 'John Viles'
          - 'Jeff Wedvick'
      school_filter:
        description: 'Optional: single school to sync (exact match)'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 gspread google-auth

      - name: Run school sync
        run: python school_netsuite_sync.py
        env:
          NS_ACCOUNT: ${{ secrets.NS_ACCOUNT }}
          NS_CONSUMER_KEY: ${{ secrets.NS_CONSUMER_KEY }}
          NS_CONSUMER_SEC: ${{ secrets.NS_CONSUMER_SEC }}
          NS_TOKEN_KEY: ${{ secrets.NS_TOKEN_KEY }}
          NS_TOKEN_SEC: ${{ secrets.NS_TOKEN_SEC }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SCHOOL_FILTER: ${{ inputs.school_filter }}
          SALES_REP_FILTER: ${{ inputs.sales_rep }}
